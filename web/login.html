<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log in · DealAmigo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="login.css">
</head>
<body class="auth-body">

<a class="auth-brand" href="index.html"><span class="brand-mark">◆</span> DealAmigo</a>

<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to keep dealing.</p>

    <!-- role toggle -->
    <div class="role-toggle" id="roleToggle">
      <button class="role-btn active" data-role="user">
        <span class="role-ic">🛍️</span>
        <span><b>I'm a buyer</b><small>Browse &amp; negotiate</small></span>
      </button>
      <button class="role-btn" data-role="owner">
        <span class="role-ic">🏪</span>
        <span><b>I'm a business</b><small>Manage my shop</small></span>
      </button>
    </div>

    <!-- google -->
    <button class="google-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <!-- email form -->
    <form class="auth-form" id="authForm">
      <label class="name-field" id="nameField" hidden>Full name
        <input type="text" id="fullName" placeholder="Your name" autocomplete="name">
      </label>
      <label>Email
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </label>
      <label>Password
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required minlength="6">
      </label>
      <div class="auth-msg" id="authMsg" hidden></div>
      <button class="btn btn-green btn-lg auth-submit" id="submitBtn" type="submit">Log in</button>
    </form>

    <p class="auth-foot" id="modeFoot">New here? <a href="#" class="auth-link" id="modeToggle">Create an account</a></p>
  </div>

  <div class="auth-aside">
    <div class="aside-inner">
      <div class="aside-quote" id="asideQuote">
        “Bargain with local suppliers the way you always have — now with an AI that never sleeps.”
      </div>
      <div class="aside-panel" id="asidePanel">
        <div class="ap-row"><span class="ap-ic">🗣️</span> Negotiates in your language</div>
        <div class="ap-row"><span class="ap-ic">⚖️</span> Owner sets the floor price</div>
        <div class="ap-row"><span class="ap-ic">🧾</span> Instant receipt &amp; WhatsApp handoff</div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
