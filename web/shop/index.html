<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop · DealAmigo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="style.css">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="shop-body">

<header class="app-bar">
  <a class="brand" href="../shops.html"><span class="brand-mark">◆</span> DealAmigo</a>
  <div class="app-bar-right">
    <a class="app-link" href="../shops.html">← All shops</a>
  </div>
</header>

<main class="shop-main" id="shopMain"><!-- filled by JS --></main>

<!-- chat drawer -->
<div class="chat-scrim hidden" id="chatScrim"></div>
<aside class="chat-drawer hidden" id="chatDrawer" aria-label="Chat">
  <div class="cd-head">
    <div class="cd-head-left">
      <div class="cd-avatar" id="cdAvatar">C</div>
      <div>
        <div class="cd-name" id="cdName">Shop</div>
        <div class="cd-status"><span class="dot"></span> AI agent · online</div>
      </div>
    </div>
    <button class="cd-close" id="cdClose" aria-label="Close">✕</button>
  </div>

  <div class="cd-scroll" id="chatScroll">
    <div id="chatLog"></div>
    <div id="typing" class="chat-row agent hidden"><div class="bubble agent typing"><span></span><span></span><span></span></div></div>
  </div>

  <div id="approvalWait" class="cd-banner hidden">The shop is checking with the owner about your request — one moment…</div>
  <div id="orderDone" class="cd-done hidden"></div>

  <form class="cd-input" id="chatForm">
    <input id="chatText" type="text" autocomplete="off" placeholder="Message the shop… any language">
    <button type="submit" aria-label="Send">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </form>
</aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../data.js"></script>
<script src="app.js"></script>
</body>
</html>
